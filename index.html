<h1>Welcome</h1>

<div class="slideshow">
  <img id="slide" src="">
  <div class="caption" id="caption"></div>
</div>

<script>
  const photos = [
    {
      url: "https://your-r2-link/photo1.jpg",
      text: "Tokyo Trip - 2024 - Shibuya"
    },
    {
      url: "https://your-r2-link/photo2.jpg",
      text: "Family BBQ - 2024 - Backyard"
    },
    {
      url: "https://your-r2-link/photo3.jpg",
      text: "Beach Day - 2023 - Okinawa"
    }
  ];

  let current = Math.floor(Math.random() * photos.length);

  function showSlide() {
    document.getElementById("slide").src = photos[current].url;
    document.getElementById("caption").innerText = photos[current].text;

    current = (current + 1) % photos.length;
  }

  showSlide();
  setInterval(showSlide, 3000);
</script>
