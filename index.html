<!DOCTYPE html>
<html>
<head>
  <title>My Photos</title>
  <style>
    body {
      font-family: sans-serif;
      background: #111;
      color: white;
      text-align: center;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
      padding: 10px;
    }
    img {
      width: 100%;
      height: auto;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<h1>Family Photos</h1>

<div class="gallery">
  <img src="https://your-r2-link/photo1.jpg">
  <img src="https://your-r2-link/photo2.jpg">
</div>

</body>
</html>
