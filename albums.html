<!DOCTYPE html>
<html>
<head>

    <div class="sidebar">

</div>{
      margin: 0;
      font-family: sans-serif;
      display: flex;
      background: #111;
      color: white;
    }

    /* Sidebar */
    .sidebar {
      width: 250px;
      background: #1a1a1a;
      padding: 15px;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar h2 {
      margin-top: 0;
    }

    .accordion {
      cursor: pointer;
      padding: 10px;
      background: #333;
      margin-top: 5px;
      border-radius: 5px;
    }

    .panel {
      display: none;
      padding-left: 10px;
    }

    .panel a {
      display: block;
      padding: 5px;
      color: #ccc;
      text-decoration: none;
    }

    .panel a:hover {
      color: white;
    }

    /* Main content */
    .content {
      flex: 1;
      padding: 20px;
    }

    .albums {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    .album {
      background: #222;
      padding: 10px;
      border-radius: 8px;
      text-align: center;
    }

    .album img {
      width: 100%;
      border-radius: 6px;
    }

    .album-title {
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div class="sidebar">
  <h2>Albums</h2>

  <div class="accordion">2024</div>
  <div class="panel">
    <a href="#">Trip to Tokyo</a>

  <div class="accordion">2023</div>

    <a href="#">Beach Day</a>

  </div>

</div>

<div class="content">
  <h1>Photo Albums</h1>

  <div class="albums">
    <div class="album">
      <img src="https://your-r2-link/album1-cover.jpg">
      <div class="album-title">Trip to Tokyo</div>
    </div>

    <div class="album">
      <img src="https://your-r2-link/album2-cover.jpg">
      <div class="album-title">Family BBQ</div>
    </div>
  </div>
</div>

<script>
  const accordions = document.querySelectorAll(".accordion");
  accordions.forEach(acc => {
    acc.addEventListener("click", () => {
      const panel = acc.nextElementSibling;
      panel.style.display = panel.style.display === "block" ? "none" : "block";
    });
  });
</script>

</body>
